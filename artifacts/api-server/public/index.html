<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Funil Typebot</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%236c47ff'><polygon points='13 2 3 14 12 14 11 22 21 10 12 10 13 2'/></svg>" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
      </div>
      <h1>Gerador de Funil Typebot</h1>
      <p class="subtitle">Preencha os dados da modelo e gere o JSON + áudio automaticamente</p>
    </div>

    <form id="funnel-form" novalidate>
      <div id="global-error" class="global-error"></div>

      <!-- Seção 1: Dados da Modelo -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <h2>Dados da Modelo</h2>
        </div>
        <div class="card-body">
          <div class="form-grid">
            <div class="field">
              <label for="nomeModelo">Nome da modelo *</label>
              <input type="text" id="nomeModelo" name="nomeModelo" placeholder="Ex: Bianca" required />
              <span class="field-error" id="err-nomeModelo"></span>
            </div>
            <div class="field">
              <label for="slugModelo">Slug (identificador) *</label>
              <input type="text" id="slugModelo" name="slugModelo" placeholder="Ex: bianca" required />
              <span class="field-error" id="err-slugModelo"></span>
            </div>
            <div class="field full">
              <label for="nomeCompletoModelo">Nome completo *</label>
              <input type="text" id="nomeCompletoModelo" name="nomeCompletoModelo" placeholder="Ex: Bianca Santos" required />
              <span class="field-error" id="err-nomeCompletoModelo"></span>
            </div>
            <div class="field">
              <label for="idadeModelo">Idade *</label>
              <input type="text" id="idadeModelo" name="idadeModelo" placeholder="Ex: 22" required />
              <span class="field-error" id="err-idadeModelo"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Seção 2: Mídias -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
          <h2>Mídias</h2>
        </div>
        <div class="card-body">
          <div class="form-grid">
            <div class="field full">
              <label for="fotoPerfilUrl">Foto de perfil (URL) *</label>
              <input type="url" id="fotoPerfilUrl" name="fotoPerfilUrl" placeholder="https://..." required />
              <span class="field-error" id="err-fotoPerfilUrl"></span>
            </div>
            <div class="field full">
              <label for="audioUrl">URL do áudio *</label>
              <input type="url" id="audioUrl" name="audioUrl" placeholder="https://..." required />
              <span class="field-error" id="err-audioUrl"></span>
            </div>
            <div class="field full">
              <label for="imagemApresentacaoUrl">Imagem de apresentação (URL) *</label>
              <input type="url" id="imagemApresentacaoUrl" name="imagemApresentacaoUrl" placeholder="https://..." required />
              <span class="field-error" id="err-imagemApresentacaoUrl"></span>
            </div>

            <div class="field">
              <label for="fotoAmostra1Url">Foto amostra 1 (URL) *</label>
              <input type="url" id="fotoAmostra1Url" name="fotoAmostra1Url" placeholder="https://..." required />
              <span class="field-error" id="err-fotoAmostra1Url"></span>
            </div>
            <div class="field">
              <label for="fotoAmostra2Url">Foto amostra 2 (URL) *</label>
              <input type="url" id="fotoAmostra2Url" name="fotoAmostra2Url" placeholder="https://..." required />
              <span class="field-error" id="err-fotoAmostra2Url"></span>
            </div>
            <div class="field">
              <label for="fotoAmostra3Url">Foto amostra 3 (URL) *</label>
              <input type="url" id="fotoAmostra3Url" name="fotoAmostra3Url" placeholder="https://..." required />
              <span class="field-error" id="err-fotoAmostra3Url"></span>
            </div>
            <div class="field">
              <label for="fotoAmostra4Url">Foto amostra 4 (URL) *</label>
              <input type="url" id="fotoAmostra4Url" name="fotoAmostra4Url" placeholder="https://..." required />
              <span class="field-error" id="err-fotoAmostra4Url"></span>
            </div>
            <div class="field">
              <label for="fotoAmostra5Url">Foto amostra 5 (URL) *</label>
              <input type="url" id="fotoAmostra5Url" name="fotoAmostra5Url" placeholder="https://..." required />
              <span class="field-error" id="err-fotoAmostra5Url"></span>
            </div>
            <div class="field">
              <label for="fotoAmostra6Url">Foto amostra 6 (URL) *</label>
              <input type="url" id="fotoAmostra6Url" name="fotoAmostra6Url" placeholder="https://..." required />
              <span class="field-error" id="err-fotoAmostra6Url"></span>
            </div>
            <div class="field">
              <label for="fotoAmostra7Url">Foto amostra 7 (URL) *</label>
              <input type="url" id="fotoAmostra7Url" name="fotoAmostra7Url" placeholder="https://..." required />
              <span class="field-error" id="err-fotoAmostra7Url"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Seção 3: Entrega -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.44 2 2 0 0 1 3.58 1.25h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.64a16 16 0 0 0 6 6l1.06-1.06a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21.72 16z"/>
            </svg>
          </div>
          <h2>Entrega</h2>
        </div>
        <div class="card-body">
          <div class="form-grid single">
            <div class="field">
              <label for="linkEntregaConteudo">Link de entrega do conteúdo *</label>
              <input type="url" id="linkEntregaConteudo" name="linkEntregaConteudo" placeholder="https://..." required />
              <span class="field-error" id="err-linkEntregaConteudo"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Seção 4: Meta CAPI -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/>
            </svg>
          </div>
          <h2>Meta CAPI</h2>
        </div>
        <div class="card-body">
          <div class="form-grid">
            <div class="field">
              <label for="metaPixelId">Pixel ID *</label>
              <input type="text" id="metaPixelId" name="metaPixelId" placeholder="Ex: 123456789" required />
              <span class="field-error" id="err-metaPixelId"></span>
            </div>
            <div class="field">
              <label for="contentName">Nome do conteúdo *</label>
              <input type="text" id="contentName" name="contentName" placeholder="Ex: Pacote Premium" required />
              <span class="field-error" id="err-contentName"></span>
            </div>
            <div class="field full">
              <label for="metaAccessToken">Access Token *</label>
              <input type="text" id="metaAccessToken" name="metaAccessToken" placeholder="EAA..." required />
              <span class="field-error" id="err-metaAccessToken"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Botão -->
      <button type="submit" class="btn-submit" id="btn-submit">
        <div class="spinner" id="spinner"></div>
        <svg id="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        <span id="btn-text">Gerar Funil</span>
      </button>

      <!-- Resultado -->
      <div class="result-card" id="result-card">
        <div id="result-card-inner" class="card">
          <div class="card-header">
            <div class="card-header-icon" id="result-icon"></div>
            <h2 id="result-title"></h2>
          </div>
          <div class="card-body" id="result-body"></div>
        </div>
      </div>

    </form>
  </div>

  <script src="/app.js"></script>
</body>
</html>
