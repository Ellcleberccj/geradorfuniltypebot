[phases.setup]
nixPkgs = ["nodejs_24"]

[phases.install]
cmds = ["corepack enable && corepack prepare pnpm@10.0.0 --activate", "pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["export PORT=3000 BASE_PATH=/ NODE_ENV=production && pnpm --filter @workspace/funil-web build && rm -rf artifacts/api-server/public && cp -r artifacts/funil-web/dist/public artifacts/api-server/public && pnpm --filter @workspace/api-server build"]

[start]
cmd = "pnpm --filter @workspace/api-server start"
